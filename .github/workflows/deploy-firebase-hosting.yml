# Deploys the CRA production build to Firebase Hosting (live channel).
#
# --- One-time setup (so git/GitHub deploys Firebase; no local `firebase login` needed for releases) ---
# 1. Firebase Console → Project settings → Service accounts → Generate new private key (JSON).
# 2. Google Cloud Console → IAM → ensure that service account has a role that can deploy Hosting
#    (e.g. "Firebase Hosting Admin", or "Editor" on the project for a personal project).
# 3. GitHub → this repo → Settings → Secrets and variables → Actions → New repository secret
#      Name:  FIREBASE_SERVICE_ACCOUNT
#      Value: paste the ENTIRE JSON file contents (one line is fine).
# 4. Merge to `main` and push — this workflow only runs on `main` (see `on:` below).
#    Or: Actions tab → "Deploy Firebase Hosting" → "Run workflow" (uses latest default branch code
#    when run from the UI; clone is still the branch you select in the dropdown).
#
# If pushes to `main` never deploy: the secret is missing, mis-named, or the JSON account lacks IAM.
# This does not give the Cursor cloud agent your Firebase login; it uses the GitHub-hosted runner
# with the service account JSON stored only as an encrypted secret.
#
# After Hosting, we publish Firestore rules using the same secret. Credentials are written with
# Python (handles multiline JSON safely). If this step fails with permission denied, add a role
# on Google Cloud for that service account (e.g. Editor, or Firebase Rules Admin).
name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # GitHub is moving built-in actions off Node 20; this opts their JS runtime to Node 24 (see changelog).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: bridgechampions
          channelId: live

      - name: Deploy Firestore security rules
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          if [ -z "${FIREBASE_SERVICE_ACCOUNT:-}" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is empty or missing. Add it under Repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          python3 -c "import os, pathlib; pathlib.Path('serviceAccount.json').write_text(os.environ['FIREBASE_SERVICE_ACCOUNT'])"
          export GOOGLE_APPLICATION_CREDENTIALS="${GITHUB_WORKSPACE}/serviceAccount.json"
          npx --yes firebase-tools@13 deploy --only firestore:rules --project bridgechampions --non-interactive

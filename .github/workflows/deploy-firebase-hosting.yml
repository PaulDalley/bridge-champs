# Deploy to Firebase Hosting.
#
# This workflow is split into two jobs so the live site is updated FAST
# even when the slow SEO post-processing steps (Puppeteer prerender,
# Open Graph image generation) hang or fail:
#
#   1. fast-deploy — install, build, and ship to Firebase Hosting using
#      whatever public/sitemap.xml is already in the repo. Always finishes
#      within ~10 minutes; this is the path users notice.
#   2. refresh-seo — regenerates sitemap.xml from Firestore, prerenders
#      every public route, generates OG images, then redeploys Hosting
#      with the refreshed static assets. Slow (up to 30 min), best-effort,
#      hard-timed-out per step. If anything in here hangs, the live site
#      that fast-deploy shipped stays live; the next push refreshes again.
#
# Each individual step also has its own `timeout-minutes:` so a single
# stuck Puppeteer page can never block the rest of the workflow.
#
# --- One-time setup (so git/GitHub deploys Firebase; no local `firebase login` needed for releases) ---
# 1. Firebase Console -> Project settings -> Service accounts -> Generate new private key (JSON).
# 2. Google Cloud Console -> IAM -> ensure that service account has a role that can deploy Hosting.
# 3. GitHub -> this repo -> Settings -> Secrets and variables -> Actions -> New repository secret
#      Name:  FIREBASE_SERVICE_ACCOUNT
#      Value: paste the ENTIRE JSON file contents (one line is fine).
# 4. Merge to `main` and push. Or: Actions tab -> "Deploy Firebase Hosting" -> "Run workflow".
name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Only one deploy at a time per branch. A new push on `main` cancels any
# in-flight run on `main` so the latest commit is what reaches Hosting.
concurrency:
  group: deploy-firebase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------
  # 1. Fast path: build + deploy Hosting in ~10 minutes flat.
  # ---------------------------------------------------------------------
  fast-deploy:
    name: Build + deploy Hosting (fast)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    # GitHub is moving built-in actions off Node 20; this opts their JS
    # runtime to Node 24 (see GitHub changelog).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        timeout-minutes: 6

      - name: Build production bundle
        run: npm run build
        timeout-minutes: 6

      - name: Copy committed sitemap into build/
        run: cp public/sitemap.xml build/sitemap.xml || true

      # firebase.json rewrites every unmatched URL to /_shell.html (so SPA
      # routes like /pillars and /bidding/advanced/<id> still load the React
      # app). Without _shell.html on disk Hosting returns 404 for those
      # routes. The prerender step in refresh-seo writes a richer _shell;
      # fast-deploy just needs a basic copy of index.html so the SPA shell
      # loads while the slower SEO refresh catches up.
      - name: Seed SPA fallback (_shell.html)
        run: cp build/index.html build/_shell.html

      - name: Upload build/ for the SEO refresh job
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/
          retention-days: 1
          if-no-files-found: error

      # Hand "/" to the Next.js content app: remove the CRA index.html from the
      # Hosting root so Firebase falls through to the "/" -> bc-content rewrite
      # (a static root index.html shadows it). The artifact uploaded above still
      # carries index.html for the prerender job's shell source; the catch-all
      # "**" -> /_shell.html keeps every CRA route serving the SPA.
      - name: Hand "/" to the Next.js homepage (drop root index.html)
        run: rm -f build/index.html

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        timeout-minutes: 5
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: bridgechampions
          channelId: live

      - name: Deploy Firestore security rules (best effort)
        timeout-minutes: 3
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          if [ -z "${FIREBASE_SERVICE_ACCOUNT:-}" ]; then
            echo "::warning::FIREBASE_SERVICE_ACCOUNT empty; skipping rules deploy."
            exit 0
          fi
          python3 -c "import os, pathlib; pathlib.Path('serviceAccount.json').write_text(os.environ['FIREBASE_SERVICE_ACCOUNT'])"
          export GOOGLE_APPLICATION_CREDENTIALS="${GITHUB_WORKSPACE}/serviceAccount.json"
          set +e
          npx --yes firebase-tools@13 deploy --only firestore:rules --project bridgechampions --non-interactive
          rules_exit=$?
          set -e
          if [ "$rules_exit" -ne 0 ]; then
            echo "::warning::Firestore rules were not updated (exit ${rules_exit}). Hosting already deployed."
          fi
          exit 0

  # ---------------------------------------------------------------------
  # 2. SEO refresh: sitemap + prerender + og-images, then re-upload.
  #    Slow, best effort. The site is already live by the time this runs.
  # ---------------------------------------------------------------------
  refresh-seo:
    name: Refresh SEO assets (sitemap + prerender + og)
    needs: fast-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 55
    # Never fails the workflow as a whole; the live site already shipped.
    continue-on-error: true
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies (incl. puppeteer)
        run: npm ci --legacy-peer-deps
        timeout-minutes: 6

      - name: Download build artifact from fast-deploy
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build/

      - name: Regenerate sitemap.xml from Firestore (best effort)
        timeout-minutes: 5
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set +e
          if [ -z "${FIREBASE_SERVICE_ACCOUNT:-}" ]; then
            echo "::warning::FIREBASE_SERVICE_ACCOUNT empty; skipping sitemap regen."
            exit 0
          fi
          python3 -c "import os, pathlib; pathlib.Path('serviceAccount.json').write_text(os.environ['FIREBASE_SERVICE_ACCOUNT'])"
          FIREBASE_SERVICE_ACCOUNT="${GITHUB_WORKSPACE}/serviceAccount.json" \
            npm run sitemap:generate
          sm_exit=$?
          if [ "$sm_exit" -ne 0 ]; then
            echo "::warning::sitemap:generate failed (exit ${sm_exit}); continuing."
          fi
          if [ -f public/sitemap.xml ]; then
            cp public/sitemap.xml build/sitemap.xml
          fi
          exit 0

      # Concurrency 3 (not 6): the ubuntu runner (~7GB / 2 cores) runs low on
      # memory + Firestore connections partway through 130 pages at higher
      # parallelism, so the alphabetically-later articles (/bidding, /declarer,
      # /defence, /counting) were timing out their content-wait and shipping the
      # bare SPA shell — 75 articles served Google a generic page. Lower
      # parallelism keeps headroom; prerender.js then re-renders any straggler
      # SERIALLY with a fresh browser. Timeout raised to 25m to cover the slower
      # (but reliable) pass + retry; the critical deploy runs right after.
      - name: Prerender public routes (best effort, hard timeout)
        timeout-minutes: 25
        run: |
          set +e
          npm run prerender -- --concurrency 3 --timeout 30000
          pr_exit=$?
          if [ "$pr_exit" -ne 0 ]; then
            echo "::warning::prerender failed/timed out (exit ${pr_exit}); continuing."
          fi
          exit 0

      # Ship the prerendered HTML + fresh sitemap IMMEDIATELY, before the flaky
      # OG-image step. Previously a failing/timed-out OG step (default
      # `if: success()`) caused the single redeploy to be SKIPPED, so the
      # prerendered content never reached production and every article served a
      # bare SPA shell. This deploy must run regardless of earlier best-effort
      # step outcomes — it's the step that actually makes articles indexable.
      # Same as in fast-deploy: prerender has finished using index.html as its
      # shell source, so drop it now and "/" serves the Next.js homepage.
      - name: Hand "/" to the Next.js homepage (drop root index.html)
        run: rm -f build/index.html

      - name: Deploy Hosting with prerendered content (critical)
        if: ${{ !cancelled() }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        timeout-minutes: 5
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: bridgechampions
          channelId: live

      - name: Generate per-article OG images (best effort, hard timeout)
        if: ${{ !cancelled() }}
        continue-on-error: true
        timeout-minutes: 12
        run: |
          set +e
          npm run og:images -- --concurrency 6
          og_exit=$?
          if [ "$og_exit" -ne 0 ]; then
            echo "::warning::og:images failed/timed out (exit ${og_exit}); continuing."
          fi
          exit 0

      # Non-critical second deploy to ship any OG images that were generated.
      # Pages are already live + prerendered from the step above, so this can
      # fail without affecting indexing.
      - name: Redeploy Hosting with OG images (best effort)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: FirebaseExtended/action-hosting-deploy@v0
        timeout-minutes: 5
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: bridgechampions
          channelId: live

      # Post-deploy SEO guard. Fetch every article as Googlebot and surface any
      # that still serve a generic shell / noindex / membership redirect. Best
      # effort — never fails the deploy (the site already shipped), but prints a
      # loud ::error:: annotation on the run summary so an indexing regression is
      # visible immediately instead of weeks later in Search Console.
      - name: Verify articles are indexable (best effort)
        if: ${{ !cancelled() }}
        continue-on-error: true
        timeout-minutes: 5
        run: |
          set +e
          sleep 30   # let the Firebase CDN edge pick up the new deploy
          node scripts/audit-live-articles.js --concurrency 6 --retry 2
          exit 0
